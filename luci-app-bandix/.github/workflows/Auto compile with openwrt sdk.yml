name: "Auto compile with openwrt sdk"
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
env:
  TZ: Asia/Shanghai
  luci-app-bandix: ${{ github.repository }}

jobs:
  job_check:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      luci-app-bandix_version: ${{ steps.check_version.outputs.latest_version }}
      has_update: ${{ steps.check_version.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Check version
        id: check_version
        env:
          url_tags: https://api.github.com/repos/${{ env.luci-app-bandix }}/releases/latest
        run: |
          cd luci-app-bandix
          latest_version=$(awk -F ':=' '/^PKG_VERSION:=/ {print $2}' Makefile | tr -d ' \n')
          echo "latest_version=${latest_version}" >> $GITHUB_OUTPUT

          remote_latest_version=$(wget -qO- -t1 -T2 ${{env.url_tags}} | jq -r '.tag_name')

          if [ -z "$remote_latest_version" ] || [ "$remote_latest_version" = "null" ]; then
            echo "Failed to fetch remote tags"
            echo "has_update=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Remote latest: $remote_latest_version"
          
          # 去掉远程版本的 v 前缀进行比较
          remote_version_without_v=${remote_latest_version#v}

          if [ "$latest_version" = "$remote_version_without_v" ]; then
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "has_update=true" >> $GITHUB_OUTPUT
          fi


      - name: Prepare release
        if: steps.check_version.outputs.has_update == 'true'
        run: |
          echo "![](https://img.shields.io/github/downloads/${{ env.luci-app-bandix }}/v${{steps.check_version.outputs.latest_version}}/total?style=flat-square)" >> release.txt
          touch release.txt

      - name: Generate new tag & release
        if: steps.check_version.outputs.has_update == 'true'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{steps.check_version.outputs.latest_version}}
          target_commitish: ${{ github.ref_name }}
          prerelease: ${{steps.check_version.outputs.prerelease}}
          body_path: release.txt


  job_build:
    name: Build luci-app-bandix [${{ matrix.version }}]
    needs: job_check
    if: needs.job_check.outputs.has_update == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: ipk
            container_tag: x86_64-24.10.1
          - version: apk
            container_tag: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Generate .config for Language Packs
        run: |
          echo "CONFIG_PACKAGE_luci-app-bandix=m" > .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hant=y" >> .config
          echo "CONFIG_LUCI_LANG_ja=y" >> .config
          echo "CONFIG_LUCI_LANG_fr=y" >> .config
          echo "CONFIG_LUCI_LANG_ru=y" >> .config
          echo "CONFIG_LUCI_LANG_id=y" >> .config
          echo "CONFIG_LUCI_LANG_pl=y" >> .config
          echo "CONFIG_LUCI_LANG_th=y" >> .config
          echo "CONFIG_LUCI_LANG_es=y" >> .config
      - name: Setup OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.container_tag }}
          PACKAGES: luci-app-bandix
          V: s

      - name: Process and Rename Artifacts
        id: compile
        run: |
          mkdir -p ${{ github.workspace }}/upload
          
          # 使用 find 安全提取生成的 ipk/apk 及语言包
          find bin/packages/ -type f -name "luci-app-bandix*" -exec cp {} ${{ github.workspace }}/upload/ \;
          find bin/packages/ -type f -name "luci-i18n-bandix*" -exec cp {} ${{ github.workspace }}/upload/ \;
          
          cd ${{ github.workspace }}/upload
          
          # _all 后缀重命名逻辑
          for file in *; do
            if [[ -f "$file" ]] && [[ ! "$file" =~ _all\. ]]; then
              filename="${file%.*}"
              extension="${file##*.}"
              mv "$file" "${filename}_all.${extension}"
              echo "Renamed: $file -> ${filename}_all.${extension}"
            fi
          done
          
          echo "status=success" >> $GITHUB_OUTPUT

      # 4. 上传至 Release
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        if: steps.compile.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{needs.job_check.outputs.luci-app-bandix_version}}
          files: ${{ github.workspace }}/upload/*

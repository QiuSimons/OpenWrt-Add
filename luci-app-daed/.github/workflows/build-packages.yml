name: Build packages

on:
  workflow_dispatch:
  push:
    branches:
      - kix


permissions:
  contents: write

jobs:
  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate version metadata
        id: meta
        shell: bash
        run: |
          pkg_version=$(grep '^PKG_VERSION:=' daed/Makefile | head -n 1 | cut -d= -f2)
          pkg_release=$(grep '^PKG_RELEASE:=' daed/Makefile | head -n 1 | cut -d= -f2)

          version="${pkg_version}-r${pkg_release}"
          release_tag="daed_${version}"
          release_name="daed_${version}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

          echo "Version: ${version}"
          echo "Release tag: ${release_tag}"

  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_generic
            sdk: openwrt-24.10
            pkg_ext: ipk
          - arch: i386_pentium4
            sdk: openwrt-24.10
            pkg_ext: ipk
          - arch: x86_64
            sdk: openwrt-24.10
            pkg_ext: ipk
          - arch: aarch64_generic
            sdk: openwrt-25.12
            pkg_ext: apk
          - arch: i386_pentium4
            sdk: openwrt-25.12
            pkg_ext: apk
          - arch: x86_64
            sdk: openwrt-25.12
            pkg_ext: apk

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Init build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        shell: bash
        run: |
          sudo -E apt-get update
          sudo -E apt-get install -y clang llvm curl jq

      - name: Build packages
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-daed
          NO_REFRESH_CHECK: true
          V: s

      - name: Show built files
        shell: bash
        run: |
          echo "=== Built package files ==="
          find bin/packages -type f | grep -E '\.(ipk|apk)$' || true
          echo "==========================="


      - name: Prepare renamed artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for f in bin/packages/${{ matrix.arch }}/packages_ci/*.${{ matrix.pkg_ext }}; do
            base="$(basename "$f")"
            ext="${base##*.}"
            name="${base%.*}"

            # Avoid duplicating architecture in name, and skip architecture suffix for LuCI/all packages
            if [[ "$name" == *"${{ matrix.arch }}"* ]] || [[ "$name" == *"all"* ]] || [[ "$name" == luci-* ]]; then
              new_name="${name}-${{ matrix.sdk }}.${ext}"
            else
              new_name="${name}-${{ matrix.arch }}-${{ matrix.sdk }}.${ext}"
            fi
            
            cp "$f" "dist/${new_name}"
          done
          ls -lah dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}-${{ matrix.pkg_ext }}
          path: dist/*.${{ matrix.pkg_ext }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-dist
          merge-multiple: true

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          files: release-dist/*
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          target_commitish: ${{ github.sha }}

      - name: Delete Older Releases
        uses: dev-drprasad/delete-older-releases@master
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{secrets.ACTIONS_DEPLOY_KEY}}
        continue-on-error: true

      - name: Cleanup Old Action Artifacts
        uses: c-hive/gha-remove-artifacts@master
        with:
          age: '3 days'
          skip-recent: 3
        continue-on-error: true

      - name: Cleanup Workflow Logs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{secrets.ACTIONS_DEPLOY_KEY}}
          repository: ${{ github.repository }}
          retain_days: 3
        continue-on-error: true

